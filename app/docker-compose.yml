version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flask_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flask_network

  adminer:
    image: adminer:latest
    container_name: flask_adminer
    ports:
      - "8080:8080"
    networks:
      - flask_network
    depends_on:
      - postgres
  redis:
    image: redis:7-alpine
    container_name: flask_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - flask_network
  
volumes:
  postgres_data:
  redis_data:

networks:
  flask_network:
    driver: bridge