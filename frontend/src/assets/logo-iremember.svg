<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <defs>
    <linearGradient id="pencilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee7b7"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background transparente para que use el color de la navbar -->
  <rect width="220" height="60" fill="#020617"/>

  <!-- Ícono del lápiz (izquierda) -->
  <g transform="translate(30,30) rotate(45)">
    <!-- Body -->
    <rect x="-5.5" y="-20" width="11" height="32" rx="1.5" fill="url(#pencilGrad)"/>
    <!-- Eraser -->
    <rect x="-5.5" y="-27" width="11" height="8" rx="1.5" fill="#f87171"/>
    <!-- Eraser band -->
    <rect x="-5.5" y="-21" width="11" height="2.5" fill="#fca5a5"/>
    <!-- Tip wood -->
    <polygon points="-5.5,12 5.5,12 0,21" fill="#d4a574"/>
    <!-- Graphite -->
    <polygon points="-2.5,18 2.5,18 0,23" fill="#475569"/>
  </g>

  <!-- Accent dot -->
  <circle cx="46" cy="16" r="4" fill="url(#accentGrad)" opacity="0.95"/>

  <!-- Nombre: "I" con acento verde, "Remember" en blanco -->
  <text x="62" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="url(#accentGrad)">I</text>
  <text x="76" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#f1f5f9">Remember</text>
</svg>
